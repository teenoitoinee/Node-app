<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracking System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ GPS Tracking System</h1>
            <p>ระบบบันทึกและติดตามตำแหน่ง GPS</p>
        </header>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <div class="form-container">
                    <h2>📝 บันทึกตำแหน่ง GPS</h2>
                    
                    <form id="gpsForm">
                        <div class="form-group">
                            <label>รหัสพนักงาน *</label>
                            <input type="text" id="employeeId" placeholder="เช่น EMP001" required>
                        </div>

                        <div class="form-group">
                            <label>ตำแหน่ง/แผนก *</label>
                            <input type="text" id="position" placeholder="เช่น Sales, HR, IT" required>
                        </div>

                        <div class="form-group">
                            <label>วันที่ *</label>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Latitude *</label>
                                <input type="number" id="latitude" step="0.000001" placeholder="13.7563" required>
                            </div>
                            <div class="form-group">
                                <label>Longitude *</label>
                                <input type="number" id="longitude" step="0.000001" placeholder="100.5018" required>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="button" id="getCurrentLocation" class="btn btn-location">
                                📍 ดึงตำแหน่ง GPS ปัจจุบัน
                            </button>
                            <button type="submit" class="btn btn-primary">
                                💾 บันทึกข้อมูล
                            </button>
                        </div>
                    </form>

                    <div id="message" class="message"></div>
                </div>

                <!-- Map Section -->
                <div class="map-container">
                    <h3>🗺️ แผนที่</h3>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Data Section -->
            <div class="data-section">
                <div class="data-header">
                    <h2>📊 ข้อมูลที่บันทึก</h2>
                    <div class="data-actions">
                        <button id="refreshBtn" class="btn btn-secondary">🔄 รีเฟรช</button>
                        <button id="exportBtn" class="btn btn-success">📥 Export CSV</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>ลบ</th>
                                <th>รหัสพนักงาน</th>
                                <th>ตำแหน่ง</th>
                                <th>Latitude</th>
                                <th>Longitude</th>
                                <th>วันที่</th>
                                <th>แหล่งที่มา</th>
                                <th>เวลา</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="8" style="text-align: center;">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
